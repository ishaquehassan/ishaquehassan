<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 400px;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 40%, #0d1117 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Decorative grid dots */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle, rgba(88, 166, 255, 0.06) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  /* Accent glow */
  .glow-1 {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, transparent 70%);
    top: -80px;
    right: 100px;
    border-radius: 50%;
  }
  .glow-2 {
    position: absolute;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.10) 0%, transparent 70%);
    bottom: -60px;
    left: 80px;
    border-radius: 50%;
  }
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 80px;
    width: 100%;
  }
  .left {
    flex: 1;
  }
  .name {
    font-size: 42px;
    font-weight: 700;
    color: #e6edf3;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .title {
    font-size: 18px;
    color: #7d8590;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .title span {
    color: #58a6ff;
  }
  .badges {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge-blue {
    background: rgba(56, 189, 248, 0.12);
    color: #58a6ff;
    border: 1px solid rgba(56, 189, 248, 0.2);
  }
  .badge-purple {
    background: rgba(139, 92, 246, 0.12);
    color: #a78bfa;
    border: 1px solid rgba(139, 92, 246, 0.2);
  }
  .badge-green {
    background: rgba(63, 185, 80, 0.12);
    color: #3fb950;
    border: 1px solid rgba(63, 185, 80, 0.2);
  }
  .badge-orange {
    background: rgba(210, 153, 34, 0.12);
    color: #d29922;
    border: 1px solid rgba(210, 153, 34, 0.2);
  }
  .right {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 280px;
  }
  .stat-card {
    background: rgba(22, 27, 34, 0.8);
    border: 1px solid rgba(48, 54, 61, 0.6);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .stat-number {
    font-size: 28px;
    font-weight: 700;
    color: #e6edf3;
    min-width: 50px;
  }
  .stat-number.blue { color: #58a6ff; }
  .stat-number.green { color: #3fb950; }
  .stat-number.purple { color: #a78bfa; }
  .stat-label {
    font-size: 13px;
    color: #7d8590;
    line-height: 1.3;
  }
  .stat-label strong {
    color: #e6edf3;
    display: block;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="container">
    <div class="left">
      <div class="name">Ishaq Hassan</div>
      <div class="title">
        <span>Flutter Framework Contributor</span><br>
        Engineering Manager &middot; Open Source Author
      </div>
      <div class="badges">
        <div class="badge badge-blue">13+ YEARS</div>
        <div class="badge badge-green">3 PRs MERGED</div>
        <div class="badge badge-purple">FLUTTER DOCS LISTED</div>
        <div class="badge badge-orange">9,800+ CONTRIBUTIONS</div>
      </div>
    </div>
    <div class="right">
      <div class="stat-card">
        <div class="stat-number blue">3</div>
        <div class="stat-label"><strong>PRs Merged</strong>flutter/flutter</div>
      </div>
      <div class="stat-card">
        <div class="stat-number green">63</div>
        <div class="stat-label"><strong>Stars</strong>document_scanner_flutter</div>
      </div>
      <div class="stat-card">
        <div class="stat-number purple">135</div>
        <div class="stat-label"><strong>Forks</strong>across open source plugins</div>
      </div>
    </div>
  </div>
</body>
</html>
